version: "3.8"

services:
  scylla:
    image: scylladb/scylla:latest
    container_name: scylla_db
    ports:
      - "9042:9042" # CQL native transport
      - "9160:9160" # Thrift (optional, for legacy clients)
      - "10000:10000" # REST API
    volumes:
      - scylla_data:/var/lib/scylla
    environment:
      - SCYLLA_CLUSTER_NAME=axum_cluster
    # Limit resources for development
    command: --smp 1 --memory 1G --overprovisioned 1
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  scylla_data:
    driver: local
