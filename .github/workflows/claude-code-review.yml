name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "src/**/*.rs"
      - "migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "diesel.toml"
      - ".claude/rules/**"
      - ".github/workflows/**"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axum_backend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ==================================================================
      # Code Style — source of truth: .claude/rules/code-style.md
      # Compile-time rules: src/lib.rs #![deny] + clippy.toml thresholds
      # ==================================================================

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint
        run: cargo clippy -- -D warnings

      # ==================================================================
      # Tests
      # ==================================================================

      - name: Unit tests
        run: cargo test --lib

      - name: API and integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/axum_backend_test
          JWT_SECRET: ci-test-secret-that-is-at-least-thirty-two-bytes-long
          SERVER_HOST: 127.0.0.1
          SERVER_PORT: 3000
        run: cargo test --test api_tests --test integration_tests
