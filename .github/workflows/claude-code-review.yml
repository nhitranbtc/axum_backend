name: Claude Code Review

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - "src/**/*.rs"
      - "migrations/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "diesel.toml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build-and-test:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: axum_backend_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ==================================================================
      # Code Style — source of truth: .claude/rules/code-style.md
      # Compile-time rules: src/lib.rs #![deny] + clippy.toml thresholds
      # ==================================================================

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Lint
        run: cargo clippy -- -D warnings

      # ==================================================================
      # Code Rules — ref: .claude/rules/code-style.md
      #
      # These checks enforce rules that clippy/fmt cannot catch.
      # To add or modify rules, edit .claude/rules/code-style.md and
      # update the corresponding check below.
      # ==================================================================

      - name: "Rule: file size (code-style.md #File & Function Size)"
        run: |
          max=800
          failed=0
          while IFS= read -r f; do
            n=$(wc -l < "$f")
            [ "$n" -gt "$max" ] && echo "::error file=$f::$n lines (max $max)" && failed=1
          done < <(find src -name '*.rs' -type f)
          exit $failed

      - name: "Rule: no blocking I/O in async (code-style.md #Async Safety)"
        run: |
          grep -rn \
            -e 'std::fs::read' -e 'std::fs::write' -e 'std::fs::remove' \
            -e 'std::thread::sleep' -e 'std::process::Command::new' \
            src/ --include='*.rs' \
            && { echo "::error::Blocking I/O in async code — see .claude/rules/code-style.md #Async Safety"; exit 1; } \
            || true

      - name: "Rule: DDD layer boundaries (code-style.md #Architecture Layer Rules)"
        run: |
          failed=0
          # domain/ must not import infrastructure, presentation, diesel, axum
          grep -rn -e 'use crate::infrastructure' -e 'use crate::presentation' \
            -e 'use diesel::' -e 'use axum::' -e 'use diesel_async::' \
            src/domain/ --include='*.rs' \
            && { echo "::error::domain/ layer violation"; failed=1; } || true
          # application/ must not import infrastructure::database, presentation, diesel, axum
          grep -rn -e 'use crate::infrastructure::database' -e 'use crate::presentation' \
            -e 'use diesel::' -e 'use axum::' -e 'use diesel_async::' \
            src/application/ --include='*.rs' \
            && { echo "::error::application/ layer violation"; failed=1; } || true
          exit $failed

      # ==================================================================
      # Tests
      # ==================================================================

      - name: Unit tests
        run: cargo test --lib

      - name: API and integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/axum_backend_test
          JWT_SECRET: ci-test-secret-that-is-at-least-thirty-two-bytes-long
          SERVER_HOST: 127.0.0.1
          SERVER_PORT: 3000
        run: cargo test --test api_tests --test integration_tests

  claude-review:
    if: github.event_name == 'pull_request'
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy Claude config
        run: cp -r .claude/ ~/.claude/

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for the axum_backend Rust project.
            The build, code-style checks, and all tests have already passed CI.

            CI already enforces these rules automatically:
            - cargo fmt (rustfmt.toml: max_width=100, 4-space indent)
            - cargo clippy -D warnings (#![deny] unwrap_used, expect_used, panic, todo)
            - clippy.toml thresholds (cognitive_complexity=25, too_many_lines=50, nesting=6)
            - File size limit (800 lines max)
            - No blocking I/O in async code (std::fs, std::thread::sleep, std::sync::Mutex)
            - DDD layer boundaries (domain/ has no infra deps, application/ no concrete types)

            Focus your review on what CI cannot catch:
            - Business logic correctness and edge cases
            - Error propagation: structured errors with From impls, not .to_string() erasure
            - Security: RBAC checks in handlers, secrets from env vars, parameterized queries
            - Ownership: unnecessary .clone(), &str vs String in params, Arc usage
            - CQRS: new write ops in commands/, read ops in queries/, not legacy use_cases/
            - Value objects: invariants at construction, FromStr not custom parse

            Reference .claude/rules/code-style.md for the full rule set.
            Flag CRITICAL issues as blockers. Provide actionable suggestions with code examples.

