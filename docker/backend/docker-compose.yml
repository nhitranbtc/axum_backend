# =============================================================================
# Axum Backend — Docker Compose
#
# Services:
#   ScyllaDB cluster (3 nodes) + Scylla Manager
#   Redis, NATS
#   Axum backend
#
# Start: bash docker/backend/run_container.sh
# =============================================================================

# ── YAML Anchors ──────────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ───────────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: axum_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - axum_net

  # ── NATS ────────────────────────────────────────────────────────────────────

  nats:
    image: nats:latest
    container_name: axum_nats
    restart: unless-stopped
    ports:
      - "4222:4222"    # Client connections
      - "8222:8222"    # HTTP monitoring
    env_file:
      - ../../.env
    command: >
      --user ${NATS_USER}
      --pass ${NATS_PASSWORD}
      --http_port 8222
    networks:
      - axum_net

  # ── Axum Backend ────────────────────────────────────────────────────────────

  backend:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
    image: axum_backend:latest
    container_name: axum_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      # Override with Docker service names (ignores localhost values in .env).
      # SCYLLA_NODES_DOCKER is set by run_container.sh based on --single/--cluster.
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - SCYLLA_NODES=${SCYLLA_NODES_DOCKER}
    depends_on:
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - axum_net

# ── Networks & Volumes ────────────────────────────────────────────────────────

networks:
  axum_net:
    name: axum_net
    external: true
