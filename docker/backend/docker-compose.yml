version: "3.8"

services:
  # ── ScyllaDB ────────────────────────────────────────────────────────────────
  scylla:
    image: scylladb/scylla:6.2
    container_name: axum_scylla
    restart: unless-stopped
    ports:
      - "9042:9042"
      - "9160:9160"
      - "10000:10000"
    volumes:
      - scylla_data:/var/lib/scylla
    env_file:
      - ../../.env
    command: --smp 1 --memory 1G --overprovisioned 1 --developer-mode 1 --authenticator PasswordAuthenticator
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -u $${SCYLLA_USERNAME} -p $${SCYLLA_PASSWORD} -e 'describe keyspaces' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - axum_net


  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: axum_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - axum_net

  # ── NATS ────────────────────────────────────────────────────────────────────
  nats:
    image: nats:latest
    container_name: axum_nats
    restart: unless-stopped
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    env_file:
      - ../../.env
    command: >
      --user ${NATS_USER}
      --pass ${NATS_PASSWORD}
      --http_port 8222
    networks:
      - axum_net

  # ── Axum Backend ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
    image: axum_backend:latest
    container_name: axum_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../../.env

    depends_on:
      scylla:
        condition: service_healthy
      redis:
        condition: service_started
      nats:
        condition: service_started
    networks:
      - axum_net
networks:
  axum_net:
    driver: bridge

volumes:
  scylla_data:
    driver: local
